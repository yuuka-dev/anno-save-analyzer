coverage:
  # v0.3.0 で floor を 100 → 90 に緩和した方針に合わせる．
  # pyproject.toml [tool.coverage.report].fail_under と揃え，
  # project (全体) は 90% + 2% の許容，patch (PR diff) は 80% +
  # 5% 許容に設定．純関数層は実質 100% 維持を目標にしつつ，
  # UI / async layer の pragma 戦いを吸収するための数字．
  status:
    project:
      default:
        target: 90%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**"
  - "docs/**"
  - "refs/**"
