name: docs

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install \
            "sphinx>=7.3" \
            "furo>=2024.5" \
            "myst-parser>=4.0" \
            "sphinx-autodoc-typehints>=2.0" \
            "autodoc-pydantic>=2.0" \
            "sphinx-copybutton>=0.5" \
            "sphinx-design>=0.6"

      - name: Build English docs
        working-directory: docs
        run: make html

      - name: Build Japanese docs
        working-directory: docs
        run: make html-ja

      - name: Assemble deploy artifact
        run: |
          mkdir -p _site
          cp -r docs/_build/html/. _site/
          mkdir -p _site/ja
          cp -r docs/_build/ja/html/. _site/ja/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
