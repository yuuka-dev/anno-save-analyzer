name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (editable) with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tui,optimizer]"
          pip install pytest pytest-cov pytest-asyncio

      - name: Run pytest with coverage (fail-under from pyproject)
        # ``--cov-config`` を明示しないと pytest-cov 7.x が
        # pyproject の ``[tool.coverage.report]`` を読まないケースがある
        # (``pragma: no cover`` / ``exclude_lines`` が効かず stmt 数がズレる)．
        # ``fail_under`` も pyproject 側に一元化したので CLI 側では指定しない．
        run: |
          pytest \
            --cov=anno_save_analyzer \
            --cov-config=pyproject.toml \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-branch

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests

  validate-supply-data:
    name: validate supply YAML (regenerate from Calculator)
    runs-on: ubuntu-latest
    env:
      CALCULATOR_REPO: NiHoel/Anno1800Calculator
      CALCULATOR_REF: 61ab6df27af3338a01fde759dd51d4c795ed73c2
    steps:
      - name: Checkout anno-save-analyzer
        uses: actions/checkout@v4

      - name: Checkout Anno1800Calculator (pinned)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CALCULATOR_REPO }}
          ref: ${{ env.CALCULATOR_REF }}
          path: external/calculator

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install pyyaml

      - name: Install Node deps
        working-directory: scripts
        run: npm ci --no-audit --no-fund

      - name: Regenerate consumption YAML
        run: |
          python scripts/generate_supply_data_anno1800.py \
            --calculator-dir external/calculator \
            --data-dir src/anno_save_analyzer/data

      - name: Fail if committed YAML is stale
        run: |
          if ! git diff --exit-code \
              src/anno_save_analyzer/data/consumption_anno1800.en.yaml \
              src/anno_save_analyzer/data/consumption_anno1800.ja.yaml; then
            echo "::error::consumption_anno1800.*.yaml is stale. Run scripts/generate_supply_data_anno1800.py and commit the diff."
            exit 1
          fi
